name: Generate Snake Animation

on:
  schedule:
    # Berjalan otomatis setiap 12 jam
    - cron: "0 */12 * * *"
  
  # Memungkinkan kamu menjalankan workflow secara manual dari tab Actions
  workflow_dispatch:
  
  # Berjalan otomatis setiap ada push ke branch main/master
  push:
    branches:
    - main
    - master

jobs:
  generate:
    permissions: 
      contents: write # Wajib agar bot memiliki izin menulis file
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Generate animasi snake dari kontribusi GitHub kamu
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Push file hasil render ke branch 'output'
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
