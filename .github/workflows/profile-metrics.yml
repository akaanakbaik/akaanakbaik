name: Profile Metrics

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'badges/**'
      - 'stats/**'
      - 'generated/**'

concurrency:
  group: profile-metrics
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate profile metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: akaanakbaik
        run: node scripts/generate-profile-metrics.mjs

      - name: Commit generated metrics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update generated profile metrics'
          file_pattern: 'badges/*.json stats/* generated/*.svg'
